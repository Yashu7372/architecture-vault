name: SDCourse First Five Lessons

on:
  push:
    branches:
      - feature/sdcourse-daily-learning-builder
    paths:
      - "engineering-knowledge-base/**"
      - ".github/workflows/sdcourse-first-five.yml"
  pull_request:
    branches:
      - feature/system-design-academy-context-layer
    paths:
      - "engineering-knowledge-base/**"
      - ".github/workflows/sdcourse-first-five.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-first-five:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engineering-knowledge-base/requirements.txt

      - name: Install dependencies
        run: pip install -r engineering-knowledge-base/requirements.txt

      - name: Scrape and complete first five lessons
        shell: bash
        run: |
          rm -rf engineering-knowledge-base/output
          mkdir -p engineering-knowledge-base/output/diagnostics
          set -o pipefail
          python engineering-knowledge-base/scripts/run_daily_course_learning.py \
            --track python-js \
            --lessons-per-run 5 \
            2>&1 | tee engineering-knowledge-base/output/diagnostics/first-five-run.log

      - name: List generated outputs
        run: |
          echo "Generated files:"
          find engineering-knowledge-base/output -maxdepth 5 -type f | sort || true
          echo "Scheduler state:"
          cat engineering-knowledge-base/output/scheduler/sdcourse-state.json || true
          echo "Collection report:"
          cat engineering-knowledge-base/output/reports/sdcourse-python-js-collection.json || true
          echo "Run diagnostics:"
          cat engineering-knowledge-base/output/diagnostics/first-five-run.log || true

      - name: Upload first-five learning artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdcourse-first-five-lessons
          path: engineering-knowledge-base/output
          if-no-files-found: error
          retention-days: 14

      - name: Verify daily outputs
        run: |
          test -f engineering-knowledge-base/output/daily-learning/sdcourse-python-js/day-001/01-public-source.md
          test -f engineering-knowledge-base/output/daily-learning/sdcourse-python-js/day-001/02-completed-lesson.md
          test -f engineering-knowledge-base/output/daily-learning/sdcourse-python-js/day-005/01-public-source.md
          test -f engineering-knowledge-base/output/daily-learning/sdcourse-python-js/day-005/02-completed-lesson.md
