name: Engineering Knowledge Base CI

on:
  push:
    paths:
      - "engineering-knowledge-base/**"
      - ".github/workflows/engineering-knowledge-base-ci.yml"
  pull_request:
    paths:
      - "engineering-knowledge-base/**"
      - ".github/workflows/engineering-knowledge-base-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engineering-knowledge-base/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r engineering-knowledge-base/requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q engineering-knowledge-base

      - name: Run unit tests
        shell: bash
        run: |
          mkdir -p engineering-knowledge-base/test-results
          set -o pipefail
          python -m unittest discover \
            -s engineering-knowledge-base/tests \
            -p "test_*.py" \
            2>&1 | tee engineering-knowledge-base/test-results/unittest.log

      - name: Upload unit-test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engineering-knowledge-base-test-log
          path: engineering-knowledge-base/test-results/unittest.log
          if-no-files-found: error
          retention-days: 7
