<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">12 Angular performance optimization techniques</title>
  <desc id="desc">An infographic of twelve production Angular performance techniques: measurement, OnPush, signals, list tracking, lazy routes, deferred views, virtualization, RxJS rate control, image optimization, SSR and hydration, bundle budgets, and state colocation.</desc>
  <defs>
    <style>
      .bg{fill:#f7f9fc}.card{fill:#fff;stroke:#d9e2ef;stroke-width:2}.title{font:700 54px Arial,sans-serif;fill:#12213a}.sub{font:400 24px Arial,sans-serif;fill:#50627a}.ct{font:700 23px Arial,sans-serif;fill:#15233a}.body{font:400 18px Arial,sans-serif;fill:#53647b}.benefit{font:700 16px Arial,sans-serif;fill:#1f6f5f}.badge{fill:#1769e0}.bn{font:700 24px Arial,sans-serif;fill:#fff}.chip{fill:#ffe98a}.chiptext{font:700 16px Arial,sans-serif;fill:#5d4a00}.line{stroke:#1769e0;stroke-width:5;stroke-linecap:round}.muted{stroke:#a8b7c9;stroke-width:3;stroke-linecap:round}.footer{font:700 19px Arial,sans-serif;fill:#18304f}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1120" rx="28"/>
  <circle cx="85" cy="78" r="40" fill="#e8f1ff" stroke="#1769e0" stroke-width="3"/>
  <path d="M61 78h48M85 54v48M69 62l32 32M101 62L69 94" class="line"/>
  <text x="145" y="75" class="title">12 Angular Performance Optimization Techniques</text>
  <text x="148" y="113" class="sub">Measure first. Render less. Load less. Move less data.</text>

  <!-- row 1 -->
  <g transform="translate(50 160)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">1</text><rect class="chip" x="82" y="23" width="170" height="35" rx="8"/><text class="chiptext" x="167" y="46" text-anchor="middle">Measure First</text><path d="M38 108h55l20-32 27 58 25-42 30 16h55" fill="none" class="line"/><text class="ct" x="280" y="101">Profile real work</text><text class="body" x="280" y="131">Use DevTools, Angular</text><text class="body" x="280" y="155">profiler and Web Vitals.</text><text class="benefit" x="20" y="184">Benefit: fixes the actual bottleneck</text></g>
  <g transform="translate(557 160)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">2</text><rect class="chip" x="82" y="23" width="155" height="35" rx="8"/><text class="chiptext" x="160" y="46" text-anchor="middle">OnPush</text><rect x="35" y="88" width="95" height="55" rx="10" fill="#e8f1ff" stroke="#1769e0" stroke-width="2"/><text class="body" x="82" y="120" text-anchor="middle">Parent</text><path d="M140 115h55" class="muted"/><path d="M185 106l12 9-12 9" fill="none" class="muted"/><rect x="205" y="88" width="110" height="55" rx="10" fill="#edf9f4" stroke="#1f806d" stroke-width="2"/><text class="body" x="260" y="120" text-anchor="middle">OnPush child</text><text class="ct" x="335" y="101">Bound checks</text><text class="body" x="335" y="131">Make state transitions</text><text class="body" x="335" y="155">explicit and immutable.</text><text class="benefit" x="20" y="184">Benefit: avoids broad view reevaluation</text></g>
  <g transform="translate(1064 160)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">3</text><rect class="chip" x="82" y="23" width="170" height="35" rx="8"/><text class="chiptext" x="167" y="46" text-anchor="middle">Signals + computed</text><circle cx="70" cy="115" r="25" fill="#e8f1ff" stroke="#1769e0" stroke-width="3"/><circle cx="160" cy="88" r="20" fill="#edf9f4" stroke="#1f806d" stroke-width="3"/><circle cx="160" cy="142" r="20" fill="#fff6d4" stroke="#bc8b00" stroke-width="3"/><path d="M95 110l42-17M95 120l42 17" class="muted"/><text class="ct" x="220" y="101">Track dependencies</text><text class="body" x="220" y="131">Derive state lazily; avoid</text><text class="body" x="220" y="155">effect-based propagation.</text><text class="benefit" x="20" y="184">Benefit: targeted reactive invalidation</text></g>

  <!-- row 2 -->
  <g transform="translate(50 380)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">4</text><rect class="chip" x="82" y="23" width="170" height="35" rx="8"/><text class="chiptext" x="167" y="46" text-anchor="middle">Stable @for track</text><g transform="translate(30 82)"><rect width="170" height="22" rx="6" fill="#e8f1ff"/><rect y="30" width="170" height="22" rx="6" fill="#edf9f4"/><rect y="60" width="170" height="22" rx="6" fill="#fff6d4"/><circle cx="15" cy="11" r="5" fill="#1769e0"/><circle cx="15" cy="41" r="5" fill="#1f806d"/><circle cx="15" cy="71" r="5" fill="#bc8b00"/></g><text class="ct" x="225" y="101">Reuse DOM and views</text><text class="body" x="225" y="131">Track by stable domain ID,</text><text class="body" x="225" y="155">never by changing object shape.</text><text class="benefit" x="20" y="184">Benefit: prevents list DOM churn</text></g>
  <g transform="translate(557 380)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">5</text><rect class="chip" x="82" y="23" width="170" height="35" rx="8"/><text class="chiptext" x="167" y="46" text-anchor="middle">Lazy route chunks</text><rect x="32" y="88" width="120" height="70" rx="10" fill="#e8f1ff" stroke="#1769e0" stroke-width="2"/><text class="body" x="92" y="118" text-anchor="middle">Main bundle</text><text class="body" x="92" y="142" text-anchor="middle">shell + core</text><path d="M162 123h55" class="muted"/><path d="M207 114l12 9-12 9" fill="none" class="muted"/><rect x="230" y="82" width="38" height="38" rx="8" fill="#edf9f4"/><rect x="278" y="105" width="38" height="38" rx="8" fill="#fff6d4"/><text class="ct" x="335" y="101">Split by feature</text><text class="body" x="335" y="131">Load business areas</text><text class="body" x="335" y="155">only when navigated.</text><text class="benefit" x="20" y="184">Benefit: smaller startup payload</text></g>
  <g transform="translate(1064 380)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">6</text><rect class="chip" x="82" y="23" width="145" height="35" rx="8"/><text class="chiptext" x="155" y="46" text-anchor="middle">@defer</text><rect x="30" y="85" width="145" height="75" rx="10" fill="#f2f5f9" stroke="#a8b7c9" stroke-width="2"/><path d="M55 108h95M55 126h70M55 144h84" class="muted"/><circle cx="190" cy="122" r="18" fill="#ffe98a"/><path d="M190 110v14l9 7" fill="none" stroke="#6f5900" stroke-width="3" stroke-linecap="round"/><text class="ct" x="235" y="101">Defer heavy UI</text><text class="body" x="235" y="131">Use viewport, interaction,</text><text class="body" x="235" y="155">idle or explicit triggers.</text><text class="benefit" x="20" y="184">Benefit: moves noncritical work later</text></g>

  <!-- row 3 -->
  <g transform="translate(50 600)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">7</text><rect class="chip" x="82" y="23" width="155" height="35" rx="8"/><text class="chiptext" x="160" y="46" text-anchor="middle">Virtualization</text><rect x="30" y="80" width="165" height="88" rx="10" fill="#fff" stroke="#a8b7c9" stroke-width="2"/><path d="M40 96h145M40 116h145M40 136h145M40 156h145" class="muted"/><rect x="38" y="113" width="150" height="27" rx="5" fill="#e8f1ff" stroke="#1769e0"/><text class="ct" x="225" y="101">Render the viewport</text><text class="body" x="225" y="131">Keep thousands of rows</text><text class="body" x="225" y="155">out of the live DOM.</text><text class="benefit" x="20" y="184">Benefit: fast long lists and grids</text></g>
  <g transform="translate(557 600)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">8</text><rect class="chip" x="82" y="23" width="215" height="35" rx="8"/><text class="chiptext" x="190" y="46" text-anchor="middle">Debounce / audit / switchMap</text><rect x="30" y="90" width="180" height="38" rx="10" fill="#fff" stroke="#a8b7c9" stroke-width="2"/><text class="body" x="48" y="115">Search...</text><path d="M35 153h28m12 0h28m40 0h28" class="line"/><path d="M110 153h20" class="muted"/><text class="ct" x="235" y="101">Control event rate</text><text class="body" x="235" y="131">Cancel obsolete work and</text><text class="body" x="235" y="155">bound high-frequency streams.</text><text class="benefit" x="20" y="184">Benefit: fewer requests and CPU spikes</text></g>
  <g transform="translate(1064 600)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">9</text><rect class="chip" x="82" y="23" width="180" height="35" rx="8"/><text class="chiptext" x="172" y="46" text-anchor="middle">Image optimization</text><rect x="28" y="84" width="165" height="80" rx="10" fill="#e8f1ff" stroke="#1769e0" stroke-width="2"/><circle cx="65" cy="108" r="13" fill="#ffe98a"/><path d="M42 151l39-32 25 23 22-17 40 26z" fill="#7fb8ff"/><text class="ct" x="220" y="101">Right size and format</text><text class="body" x="220" y="131">Use dimensions, responsive</text><text class="body" x="220" y="155">sources, WebP/AVIF and priority.</text><text class="benefit" x="20" y="184">Benefit: improves LCP and bandwidth</text></g>

  <!-- row 4 -->
  <g transform="translate(50 820)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">10</text><rect class="chip" x="82" y="23" width="190" height="35" rx="8"/><text class="chiptext" x="177" y="46" text-anchor="middle">SSR + hydration</text><rect x="30" y="86" width="110" height="74" rx="9" fill="#edf9f4" stroke="#1f806d" stroke-width="2"/><text class="body" x="85" y="118" text-anchor="middle">Server HTML</text><text class="body" x="85" y="143" text-anchor="middle">first paint</text><path d="M150 123h48" class="muted"/><path d="M188 114l12 9-12 9" fill="none" class="muted"/><rect x="210" y="86" width="90" height="74" rx="9" fill="#e8f1ff" stroke="#1769e0" stroke-width="2"/><text class="body" x="255" y="118" text-anchor="middle">Hydrated</text><text class="body" x="255" y="143" text-anchor="middle">interactive UI</text><text class="ct" x="325" y="101">Faster first view</text><text class="body" x="325" y="131">Reuse server DOM and</text><text class="body" x="325" y="155">hydrate progressively.</text><text class="benefit" x="20" y="184">Benefit: better startup and SEO</text></g>
  <g transform="translate(557 820)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">11</text><rect class="chip" x="82" y="23" width="205" height="35" rx="8"/><text class="chiptext" x="185" y="46" text-anchor="middle">Bundle analysis + budgets</text><circle cx="103" cy="123" r="48" fill="#e8f1ff" stroke="#1769e0" stroke-width="2"/><path d="M103 123V75a48 48 0 0 1 42 71z" fill="#1769e0"/><path d="M103 123l42 23a48 48 0 0 1-76 12z" fill="#1f806d"/><text class="ct" x="180" y="101">Prevent regressions</text><text class="body" x="180" y="131">Inspect chunks, duplicate libs,</text><text class="body" x="180" y="155">side effects and source maps.</text><text class="benefit" x="20" y="184">Benefit: keeps every release lean</text></g>
  <g transform="translate(1064 820)"><rect class="card" width="486" height="200" rx="20"/><rect class="badge" x="20" y="20" width="46" height="42" rx="9"/><text class="bn" x="43" y="49" text-anchor="middle">12</text><rect class="chip" x="82" y="23" width="165" height="35" rx="8"/><text class="chiptext" x="165" y="46" text-anchor="middle">State colocation</text><rect x="30" y="85" width="110" height="72" rx="10" fill="#f2f5f9" stroke="#a8b7c9" stroke-width="2"/><text class="body" x="85" y="116" text-anchor="middle">Global store</text><text class="body" x="85" y="140" text-anchor="middle">too broad</text><path d="M150 121h45" class="muted"/><path d="M185 112l12 9-12 9" fill="none" class="muted"/><rect x="207" y="85" width="100" height="72" rx="10" fill="#edf9f4" stroke="#1f806d" stroke-width="2"/><text class="body" x="257" y="116" text-anchor="middle">Feature</text><text class="body" x="257" y="140" text-anchor="middle">route scope</text><text class="ct" x="325" y="101">Keep state near use</text><text class="body" x="325" y="131">Shorter lifetime, smaller</text><text class="body" x="325" y="155">reactive fan-out.</text><text class="benefit" x="20" y="184">Benefit: simpler and cheaper updates</text></g>

  <rect x="50" y="1042" width="1500" height="50" rx="14" fill="#e8f1ff"/>
  <text x="800" y="1075" text-anchor="middle" class="footer">Performance is an evidence loop: measure → isolate → optimize → verify → protect with budgets.</text>
</svg>