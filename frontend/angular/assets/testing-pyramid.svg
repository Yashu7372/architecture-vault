<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Angular testing strategy</title><desc id="desc">A testing pyramid with unit, component, integration, contract and end-to-end tests plus accessibility, visual and performance quality rails.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#f0fdfa"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity=".12"/></filter><style>.title{font:700 30px Inter,Segoe UI,Arial;fill:#0f172a}.sub{font:400 16px Inter,Segoe UI,Arial;fill:#475569}.h{font:700 18px Inter,Segoe UI,Arial;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial;fill:#334155}.small{font:600 13px Inter,Segoe UI,Arial;fill:#475569}.rail{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18;filter:url(#s)}</style></defs>
<rect width="1200" height="760" rx="24" fill="url(#bg)"/><text x="55" y="58" class="title">Angular Testing Strategy</text><text x="55" y="87" class="sub">Use the cheapest reliable evidence; reserve broad tests for cross-system behavior</text>

<polygon points="600,135 720,250 480,250" fill="#fee2e2" stroke="#f87171" stroke-width="2" filter="url(#s)"/><text x="600" y="205" text-anchor="middle" class="h">E2E</text><text x="600" y="229" text-anchor="middle" class="small">critical journeys</text>
<polygon points="480,270 720,270 825,380 375,380" fill="#ffedd5" stroke="#fb923c" stroke-width="2" filter="url(#s)"/><text x="600" y="318" text-anchor="middle" class="h">Integration + Contract</text><text x="600" y="346" text-anchor="middle" class="t">router • HTTP • forms • schema compatibility</text>
<polygon points="375,400 825,400 945,520 255,520" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#s)"/><text x="600" y="452" text-anchor="middle" class="h">Component Tests</text><text x="600" y="480" text-anchor="middle" class="t">template + class • inputs/outputs • user behavior</text>
<polygon points="255,540 945,540 1080,680 120,680" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#s)"/><text x="600" y="596" text-anchor="middle" class="h">Pure Unit + Service Tests</text><text x="600" y="625" text-anchor="middle" class="t">reducers • policies • validators • mappers • orchestration</text><text x="600" y="653" text-anchor="middle" class="small">fastest, most numerous, easiest to diagnose</text>

<rect x="55" y="165" width="245" height="315" class="rail"/><text x="178" y="205" text-anchor="middle" class="h">Quality Rails</text><text x="90" y="250" class="t">Accessibility automation</text><text x="90" y="288" class="t">Keyboard/manual checks</text><text x="90" y="326" class="t">Visual regression</text><text x="90" y="364" class="t">Performance budgets</text><text x="90" y="402" class="t">Architecture rules</text><text x="90" y="440" class="t">Security/dependency scans</text>
<rect x="900" y="165" width="245" height="315" class="rail"/><text x="1023" y="205" text-anchor="middle" class="h">Test Design</text><text x="935" y="250" class="t">Assert observable behavior</text><text x="935" y="288" class="t">Control time and randomness</text><text x="935" y="326" class="t">Test failures and cancellation</text><text x="935" y="364" class="t">Use realistic API fixtures</text><text x="935" y="402" class="t">Avoid arbitrary sleeps</text><text x="935" y="440" class="t">Keep tests independent</text>

<text x="600" y="720" text-anchor="middle" class="h">Confidence increases upward; execution cost and diagnosis difficulty also increase.</text>
</svg>