<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
<title id="title">Angular signals and targeted view updates</title><desc id="desc">Writable signals feed computed signals and reactive consumers, which notify Angular to schedule affected views and update changed DOM bindings.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker><style>.title{font:700 30px Inter,Segoe UI,Arial;fill:#0f172a}.sub{font:400 16px Inter,Segoe UI,Arial;fill:#475569}.b{fill:#fff;stroke-width:2;rx:18;filter:url(#s)}.producer{fill:#eff6ff;stroke:#60a5fa}.computed{fill:#f5f3ff;stroke:#a78bfa}.consumer{fill:#ecfdf5;stroke:#34d399}.scheduler{fill:#fff7ed;stroke:#fb923c}.dom{fill:#fef2f2;stroke:#f87171}.h{font:700 18px Inter,Segoe UI,Arial;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial;fill:#334155}.small{font:600 13px Inter,Segoe UI,Arial;fill:#475569}.arr{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#a)}.invalid{stroke:#f97316;stroke-width:3;stroke-dasharray:8 6;fill:none;marker-end:url(#a)}.read{stroke:#7c3aed;stroke-width:2.5;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="700" rx="24" fill="url(#bg)"/><text x="55" y="58" class="title">Signals and Angular Change Detection</text><text x="55" y="87" class="sub">Dynamic dependency tracking narrows notification; binding comparison still controls DOM writes</text>

<rect x="55" y="150" width="210" height="115" class="b producer"/><text x="160" y="187" text-anchor="middle" class="h">Writable Signal</text><text x="160" y="217" text-anchor="middle" class="t">orders()</text><text x="160" y="242" text-anchor="middle" class="small">producer + current value</text>
<rect x="55" y="335" width="210" height="115" class="b producer"/><text x="160" y="372" text-anchor="middle" class="h">Writable Signal</text><text x="160" y="402" text-anchor="middle" class="t">query()</text><text x="160" y="427" text-anchor="middle" class="small">producer + equality check</text>

<rect x="360" y="235" width="240" height="135" class="b computed"/><text x="480" y="272" text-anchor="middle" class="h">Computed Signal</text><text x="480" y="304" text-anchor="middle" class="t">filteredOrders()</text><text x="480" y="329" text-anchor="middle" class="small">memoized while dependencies are valid</text><text x="480" y="351" text-anchor="middle" class="small">dependencies recorded during execution</text>

<rect x="695" y="145" width="220" height="120" class="b consumer"/><text x="805" y="182" text-anchor="middle" class="h">Template Consumer</text><text x="805" y="213" text-anchor="middle" class="t">@for (order of filtered())</text><text x="805" y="239" text-anchor="middle" class="small">view dependency</text>
<rect x="695" y="335" width="220" height="120" class="b consumer"/><text x="805" y="372" text-anchor="middle" class="h">Effect Consumer</text><text x="805" y="403" text-anchor="middle" class="t">sync external system</text><text x="805" y="429" text-anchor="middle" class="small">cleanup on rerun/destroy</text>

<rect x="985" y="235" width="165" height="135" class="b scheduler"/><text x="1068" y="272" text-anchor="middle" class="h">Scheduler</text><text x="1068" y="304" text-anchor="middle" class="t">mark affected view</text><text x="1068" y="329" text-anchor="middle" class="t">run update pass</text><text x="1068" y="352" text-anchor="middle" class="small">zoneless notification</text>

<rect x="775" y="535" width="265" height="105" class="b dom"/><text x="908" y="572" text-anchor="middle" class="h">Binding Comparison + DOM</text><text x="908" y="603" text-anchor="middle" class="t">evaluate → compare → write only changes</text><text x="908" y="627" text-anchor="middle" class="small">stable tracking preserves list views</text>

<path d="M265 207C320 207 320 275 353 275" class="read"/><path d="M265 392C320 392 320 330 353 330" class="read"/><path d="M600 285C640 285 650 205 688 205" class="read"/><path d="M600 320C645 320 650 395 688 395" class="read"/>
<path d="M915 205C960 205 960 270 978 270" class="invalid"/><path d="M915 395C960 395 960 335 978 335" class="invalid"/><path d="M1068 370C1068 475 908 475 908 528" class="arr"/>

<rect x="55" y="535" width="570" height="105" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
<text x="80" y="568" class="h">Important distinction</text><text x="80" y="598" class="t">Invalidation says “this consumer may be stale.” Recalculation happens when required.</text><text x="80" y="625" class="t">A new signal value does not imply every component or every DOM node is rewritten.</text>
</svg>