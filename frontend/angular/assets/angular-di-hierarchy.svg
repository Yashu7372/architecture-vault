<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
<title id="title">Angular dependency injection hierarchy</title><desc id="desc">Application, route and element injector scopes with token resolution and service lifetime behavior.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker><style>.title{font:700 30px Inter,Segoe UI,Arial;fill:#0f172a}.sub{font:400 16px Inter,Segoe UI,Arial;fill:#475569}.b{fill:#fff;stroke-width:2;rx:18;filter:url(#s)}.app{fill:#eff6ff;stroke:#60a5fa}.route{fill:#f5f3ff;stroke:#a78bfa}.element{fill:#ecfdf5;stroke:#34d399}.warn{fill:#fff7ed;stroke:#fb923c}.h{font:700 18px Inter,Segoe UI,Arial;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial;fill:#334155}.small{font:600 13px Inter,Segoe UI,Arial;fill:#475569}.arr{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#a)}.resolve{stroke:#7c3aed;stroke-width:3;stroke-dasharray:8 6;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="700" rx="24" fill="url(#bg)"/><text x="55" y="58" class="title">Angular Dependency Injection Hierarchy</text><text x="55" y="87" class="sub">Where a provider is registered determines visibility, lifetime, and state sharing</text>

<rect x="360" y="125" width="480" height="115" class="b app"/><text x="600" y="162" text-anchor="middle" class="h">Application Environment Injector</text><text x="600" y="192" text-anchor="middle" class="t">session • global configuration • telemetry • shared HTTP infrastructure</text><text x="600" y="217" text-anchor="middle" class="small">lifetime: application</text>

<rect x="120" y="300" width="400" height="120" class="b route"/><text x="320" y="337" text-anchor="middle" class="h">Lazy Route / Feature Injector A</text><text x="320" y="367" text-anchor="middle" class="t">OrdersStore • OrderRepository • feature policies</text><text x="320" y="394" text-anchor="middle" class="small">created on route activation; released with feature subtree</text>
<rect x="680" y="300" width="400" height="120" class="b route"/><text x="880" y="337" text-anchor="middle" class="h">Lazy Route / Feature Injector B</text><text x="880" y="367" text-anchor="middle" class="t">ReportsStore • ReportRepository • feature policies</text><text x="880" y="394" text-anchor="middle" class="small">isolated from Feature A unless service is application-scoped</text>

<rect x="80" y="500" width="250" height="110" class="b element"/><text x="205" y="536" text-anchor="middle" class="h">Page Element Injector</text><text x="205" y="565" text-anchor="middle" class="t">page-local providers</text><text x="205" y="590" text-anchor="middle" class="small">component subtree lifetime</text>
<rect x="365" y="500" width="250" height="110" class="b element"/><text x="490" y="536" text-anchor="middle" class="h">Child Element Injector</text><text x="490" y="565" text-anchor="middle" class="t">component/directive providers</text><text x="490" y="590" text-anchor="middle" class="small">nearest provider wins</text>
<rect x="690" y="500" width="250" height="110" class="b element"/><text x="815" y="536" text-anchor="middle" class="h">Page Element Injector</text><text x="815" y="565" text-anchor="middle" class="t">page-local providers</text><text x="815" y="590" text-anchor="middle" class="small">component subtree lifetime</text>
<rect x="970" y="500" width="160" height="110" class="b warn"/><text x="1050" y="536" text-anchor="middle" class="h">Token Request</text><text x="1050" y="565" text-anchor="middle" class="t">inject(LOGGER)</text><text x="1050" y="590" text-anchor="middle" class="small">search upward</text>

<path d="M600 240V275H320V293" class="arr"/><path d="M600 240V275H880V293" class="arr"/><path d="M320 420V470H205V493" class="arr"/><path d="M320 420V470H490V493" class="arr"/><path d="M880 420V470H815V493" class="arr"/>
<path d="M970 555H947C900 555 900 455 880 427C840 370 650 370 610 247" class="resolve"/>

<text x="55" y="657" class="h">Resolution rule:</text><text x="200" y="657" class="t">start at the active injection context, use the nearest matching provider, then continue through route/environment ancestors.</text>
<text x="55" y="683" class="h">Design rule:</text><text x="180" y="683" class="t">scope mutable state to the shortest business lifetime that actually needs to share it.</text>
</svg>