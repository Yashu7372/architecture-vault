<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Angular compilation and runtime pipeline</title><desc id="desc">Angular source files pass through template parsing, type checking, instruction generation and bundling before runtime bootstrap, dependency injection, view creation and DOM updates.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fafc"/><stop offset="1" stop-color="#faf5ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker><style>.title{font:700 30px Inter,Segoe UI,Arial;fill:#0f172a}.sub{font:400 16px Inter,Segoe UI,Arial;fill:#475569}.b{fill:white;stroke:#cbd5e1;stroke-width:2;rx:16;filter:url(#s)}.src{fill:#eff6ff;stroke:#60a5fa}.compile{fill:#f5f3ff;stroke:#a78bfa}.run{fill:#ecfdf5;stroke:#34d399}.notify{fill:#fff7ed;stroke:#fb923c}.h{font:700 17px Inter,Segoe UI,Arial;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial;fill:#334155}.small{font:600 13px Inter,Segoe UI,Arial;fill:#475569}.arr{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#a)}.dash{stroke:#f97316;stroke-width:2.3;stroke-dasharray:7 6;fill:none;marker-end:url(#a)}</style></defs>
<rect width="1200" height="720" rx="24" fill="url(#bg)"/><text x="55" y="58" class="title">Angular: Source to Runtime</text><text x="55" y="87" class="sub">Ahead-of-time compilation produces instructions; runtime creates and updates views</text>
<text x="55" y="130" class="h">BUILD TIME</text>
<rect x="55" y="155" width="180" height="130" class="b src"/><text x="145" y="190" text-anchor="middle" class="h">Source</text><text x="145" y="220" text-anchor="middle" class="t">TypeScript classes</text><text x="145" y="244" text-anchor="middle" class="t">HTML templates</text><text x="145" y="268" text-anchor="middle" class="t">styles + metadata</text>
<rect x="285" y="145" width="205" height="150" class="b compile"/><text x="388" y="180" text-anchor="middle" class="h">Angular Analysis</text><text x="388" y="210" text-anchor="middle" class="t">template AST</text><text x="388" y="234" text-anchor="middle" class="t">directive / pipe matching</text><text x="388" y="258" text-anchor="middle" class="t">dependency metadata</text><text x="388" y="282" text-anchor="middle" class="t">template type-checking</text>
<rect x="540" y="155" width="205" height="130" class="b compile"/><text x="643" y="190" text-anchor="middle" class="h">Code Generation</text><text x="643" y="220" text-anchor="middle" class="t">creation instructions</text><text x="643" y="244" text-anchor="middle" class="t">update instructions</text><text x="643" y="268" text-anchor="middle" class="t">component definitions</text>
<rect x="795" y="155" width="165" height="130" class="b compile"/><text x="878" y="190" text-anchor="middle" class="h">Build</text><text x="878" y="220" text-anchor="middle" class="t">tree shaking</text><text x="878" y="244" text-anchor="middle" class="t">chunking</text><text x="878" y="268" text-anchor="middle" class="t">minification</text>
<rect x="1010" y="155" width="140" height="130" class="b src"/><text x="1080" y="195" text-anchor="middle" class="h">Artifacts</text><text x="1080" y="228" text-anchor="middle" class="t">JS chunks</text><text x="1080" y="252" text-anchor="middle" class="t">CSS/assets</text>
<path d="M235 220H278" class="arr"/><path d="M490 220H533" class="arr"/><path d="M745 220H788" class="arr"/><path d="M960 220H1003" class="arr"/>
<line x1="55" y1="335" x2="1145" y2="335" stroke="#cbd5e1" stroke-width="2"/><text x="55" y="380" class="h">RUNTIME</text>
<rect x="55" y="410" width="170" height="120" class="b run"/><text x="140" y="447" text-anchor="middle" class="h">Bootstrap</text><text x="140" y="477" text-anchor="middle" class="t">application config</text><text x="140" y="501" text-anchor="middle" class="t">root component</text>
<rect x="275" y="410" width="185" height="120" class="b run"/><text x="368" y="447" text-anchor="middle" class="h">Injector Graph</text><text x="368" y="477" text-anchor="middle" class="t">resolve providers</text><text x="368" y="501" text-anchor="middle" class="t">control lifetimes</text>
<rect x="510" y="400" width="200" height="140" class="b run"/><text x="610" y="437" text-anchor="middle" class="h">Create Views</text><text x="610" y="467" text-anchor="middle" class="t">component instances</text><text x="610" y="491" text-anchor="middle" class="t">logical view state</text><text x="610" y="515" text-anchor="middle" class="t">listeners + bindings</text>
<rect x="760" y="400" width="200" height="140" class="b run"/><text x="860" y="437" text-anchor="middle" class="h">Update Pass</text><text x="860" y="467" text-anchor="middle" class="t">evaluate bindings</text><text x="860" y="491" text-anchor="middle" class="t">compare prior values</text><text x="860" y="515" text-anchor="middle" class="t">write changed DOM</text>
<rect x="1010" y="410" width="140" height="120" class="b run"/><text x="1080" y="447" text-anchor="middle" class="h">Browser DOM</text><text x="1080" y="480" text-anchor="middle" class="t">rendered UI</text><text x="1080" y="504" text-anchor="middle" class="t">events</text>
<path d="M225 470H268" class="arr"/><path d="M460 470H503" class="arr"/><path d="M710 470H753" class="arr"/><path d="M960 470H1003" class="arr"/>
<rect x="315" y="600" width="570" height="75" class="b notify"/><text x="600" y="630" text-anchor="middle" class="h">Change notifications</text><text x="600" y="655" text-anchor="middle" class="t">signals • inputs • Angular event listeners • explicit view APIs • framework async work</text>
<path d="M600 600C600 560 860 575 860 547" class="dash"/><text x="865" y="585" class="small">schedule affected views</text>
</svg>