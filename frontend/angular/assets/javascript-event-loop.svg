<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript event loop</title>
  <desc id="desc">The call stack, browser APIs, microtask queue, task queue, render opportunity, and event-loop ordering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f0fdfa"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#475569"/></marker>
    <style>.title{font:700 30px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.sub{font:400 16px Inter,Segoe UI,Arial,sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18;filter:url(#shadow)}.stack{fill:#eff6ff;stroke:#60a5fa}.api{fill:#f5f3ff;stroke:#a78bfa}.micro{fill:#fff7ed;stroke:#fb923c}.task{fill:#fef2f2;stroke:#f87171}.render{fill:#ecfdf5;stroke:#34d399}.h{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial,sans-serif;fill:#334155}.mono{font:600 14px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#1e293b}.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.loop{stroke:#0f766e;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="700" rx="24" fill="url(#bg)"/>
  <text x="58" y="58" class="title">JavaScript Event Loop</text><text x="58" y="87" class="sub">Run-to-completion, queue priority, and browser rendering</text>

  <rect x="65" y="140" width="250" height="345" class="box stack"/>
  <text x="190" y="178" text-anchor="middle" class="h">Call Stack</text>
  <rect x="95" y="380" width="190" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd"/><text x="190" y="410" text-anchor="middle" class="mono">handleClick()</text><text x="190" y="434" text-anchor="middle" class="t">current frame</text>
  <rect x="95" y="295" width="190" height="70" rx="10" fill="#e0f2fe" stroke="#7dd3fc"/><text x="190" y="325" text-anchor="middle" class="mono">saveOrder()</text><text x="190" y="349" text-anchor="middle" class="t">synchronous work</text>
  <rect x="95" y="210" width="190" height="70" rx="10" fill="#f0f9ff" stroke="#bae6fd"/><text x="190" y="240" text-anchor="middle" class="mono">main script</text><text x="190" y="264" text-anchor="middle" class="t">bottom of stack</text>

  <rect x="430" y="140" width="300" height="170" class="box api"/>
  <text x="580" y="178" text-anchor="middle" class="h">Browser / Platform APIs</text>
  <text x="475" y="220" class="mono">setTimeout</text><text x="475" y="252" class="mono">fetch / network</text><text x="475" y="284" class="mono">DOM events</text>
  <text x="620" y="220" class="mono">IndexedDB</text><text x="620" y="252" class="mono">observers</text><text x="620" y="284" class="mono">animation</text>

  <rect x="830" y="125" width="300" height="150" class="box micro"/>
  <text x="980" y="165" text-anchor="middle" class="h">Microtask Queue</text>
  <text x="980" y="202" text-anchor="middle" class="mono">Promise.then / await</text><text x="980" y="232" text-anchor="middle" class="t">drained completely before next task</text>

  <rect x="830" y="330" width="300" height="150" class="box task"/>
  <text x="980" y="370" text-anchor="middle" class="h">Task Queue</text>
  <text x="980" y="407" text-anchor="middle" class="mono">timer / click / message</text><text x="980" y="437" text-anchor="middle" class="t">one eligible task per loop turn</text>

  <rect x="430" y="390" width="300" height="110" class="box render"/>
  <text x="580" y="430" text-anchor="middle" class="h">Render Opportunity</text>
  <text x="580" y="463" text-anchor="middle" class="t">style → layout → paint → composite</text>

  <path d="M315 225 H422" class="arrow"/><text x="365" y="210" text-anchor="middle" class="t">schedule async work</text>
  <path d="M730 200 H822" class="arrow"/><text x="776" y="185" text-anchor="middle" class="t">promise settles</text>
  <path d="M730 270 C790 270 790 405 822 405" class="arrow"/><text x="758" y="337" class="t">event/timer ready</text>
  <path d="M830 200 C760 200 760 350 315 350" class="arrow"/>
  <path d="M830 405 C760 405 760 465 730 465" class="arrow"/>
  <path d="M430 445 C345 445 345 470 315 470" class="arrow"/>

  <path d="M190 515 C190 620 980 620 980 495" class="loop"/>
  <text x="585" y="610" text-anchor="middle" class="h">Event loop: stack empty → drain microtasks → browser may render → run next task</text>

  <rect x="70" y="545" width="270" height="80" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="205" y="575" text-anchor="middle" class="mono">A, D, C, B</text>
  <text x="205" y="603" text-anchor="middle" class="t">sync → promise → timer</text>
</svg>