<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Browser navigation and rendering pipeline</title>
  <desc id="desc">A diagram showing URL navigation through networking, parsing, render tree construction, layout, paint, compositing, and user-centric performance metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <style>
      .title{font:700 30px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.subtitle{font:400 16px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16;filter:url(#shadow)}.network{fill:#eff6ff;stroke:#60a5fa}.parse{fill:#f5f3ff;stroke:#a78bfa}.render{fill:#ecfdf5;stroke:#34d399}.metric{fill:#fff7ed;stroke:#fb923c}
      .h{font:700 17px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.t{font:400 14px Inter,Segoe UI,Arial,sans-serif;fill:#334155}.small{font:600 13px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 7;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="690" fill="url(#bg)" rx="24"/>
  <text x="60" y="58" class="title">From URL to Pixels</text>
  <text x="60" y="87" class="subtitle">The browser pipeline Angular ultimately depends on</text>

  <rect x="55" y="135" width="170" height="105" class="box network"/>
  <text x="140" y="170" text-anchor="middle" class="h">1. Navigation</text>
  <text x="140" y="198" text-anchor="middle" class="t">Parse URL</text><text x="140" y="220" text-anchor="middle" class="t">DNS lookup</text>

  <rect x="275" y="135" width="180" height="105" class="box network"/>
  <text x="365" y="170" text-anchor="middle" class="h">2. Connection</text>
  <text x="365" y="198" text-anchor="middle" class="t">TCP / QUIC</text><text x="365" y="220" text-anchor="middle" class="t">TLS negotiation</text>

  <rect x="505" y="135" width="185" height="105" class="box network"/>
  <text x="597" y="170" text-anchor="middle" class="h">3. HTTP</text>
  <text x="597" y="198" text-anchor="middle" class="t">Cache / CDN / server</text><text x="597" y="220" text-anchor="middle" class="t">HTML + metadata</text>

  <rect x="740" y="120" width="195" height="135" class="box parse"/>
  <text x="837" y="158" text-anchor="middle" class="h">4. Parse Resources</text>
  <text x="837" y="187" text-anchor="middle" class="t">HTML → DOM</text><text x="837" y="211" text-anchor="middle" class="t">CSS → CSSOM</text><text x="837" y="235" text-anchor="middle" class="t">JS → execution</text>

  <rect x="985" y="135" width="160" height="105" class="box parse"/>
  <text x="1065" y="170" text-anchor="middle" class="h">5. Render Tree</text>
  <text x="1065" y="199" text-anchor="middle" class="t">Visible DOM</text><text x="1065" y="221" text-anchor="middle" class="t">+ computed styles</text>

  <path d="M225 187 H268" class="arrow"/><path d="M455 187 H498" class="arrow"/><path d="M690 187 H733" class="arrow"/><path d="M935 187 H978" class="arrow"/>

  <rect x="205" y="335" width="190" height="110" class="box render"/>
  <text x="300" y="371" text-anchor="middle" class="h">6. Layout</text>
  <text x="300" y="399" text-anchor="middle" class="t">Size and position</text><text x="300" y="423" text-anchor="middle" class="t">each render object</text>

  <rect x="505" y="335" width="190" height="110" class="box render"/>
  <text x="600" y="371" text-anchor="middle" class="h">7. Paint</text>
  <text x="600" y="399" text-anchor="middle" class="t">Create drawing commands</text><text x="600" y="423" text-anchor="middle" class="t">for visual layers</text>

  <rect x="805" y="335" width="190" height="110" class="box render"/>
  <text x="900" y="371" text-anchor="middle" class="h">8. Composite</text>
  <text x="900" y="399" text-anchor="middle" class="t">Rasterize and combine</text><text x="900" y="423" text-anchor="middle" class="t">layers on screen</text>

  <path d="M1065 247 C1065 292 300 285 300 328" class="arrow"/><path d="M395 390 H498" class="arrow"/><path d="M695 390 H798" class="arrow"/>

  <text x="60" y="510" class="h">Measure the user experience</text>
  <rect x="60" y="535" width="200" height="90" class="box metric"/><text x="160" y="568" text-anchor="middle" class="h">TTFB</text><text x="160" y="596" text-anchor="middle" class="t">Network + server latency</text>
  <rect x="280" y="535" width="200" height="90" class="box metric"/><text x="380" y="568" text-anchor="middle" class="h">FCP / LCP</text><text x="380" y="596" text-anchor="middle" class="t">Content becomes visible</text>
  <rect x="500" y="535" width="200" height="90" class="box metric"/><text x="600" y="568" text-anchor="middle" class="h">INP</text><text x="600" y="596" text-anchor="middle" class="t">Interaction responsiveness</text>
  <rect x="720" y="535" width="200" height="90" class="box metric"/><text x="820" y="568" text-anchor="middle" class="h">CLS</text><text x="820" y="596" text-anchor="middle" class="t">Visual stability</text>
  <rect x="940" y="535" width="200" height="90" class="box metric"/><text x="1040" y="568" text-anchor="middle" class="h">Long Tasks</text><text x="1040" y="596" text-anchor="middle" class="t">Main-thread blocking</text>

  <path d="M597 247 V300" class="dash"/><text x="615" y="286" class="small">TTFB ends near response start</text>
</svg>